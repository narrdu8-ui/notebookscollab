<body class="bg-gray-50 dark:bg-[#1e1e1e] text-slate-900 dark:text-[#cccccc] m-0 p-0 transition-colors duration-200">
  
  <div id="root">
    <div style="display:flex; height:100vh; align-items:center; justify-content:center; color:#64748b; flex-direction:column; gap:1rem;">
      <svg class="animate-spin h-8 w-8 text-primary-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>

  </div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Play, Plus, Trash2, Loader2, Users, Terminal, Code2, CheckCircle2, ArrowLeft, Share2, BookOpen, User, Lock, Edit2, Download, ArrowUp, ArrowDown, XCircle, Upload, LogOut, Key, Unlock, X, RotateCcw, RotateCw, Settings, Moon, Sun, Copy as CopyIcon, Scissors, ClipboardPaste, Shield, GraduationCap, AlignLeft, AlignCenter, AlignRight, Search, CheckSquare } from 'lucide-react';
    import { marked } from 'marked';

    const DB_URL = 'db.json';       
    const API_URL = 'server.php';   

    const generateUUID = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };

    const safeMarked = (text) => {
      try {
        if (typeof marked !== 'undefined' && typeof marked.parse === 'function') return marked.parse(text);
        else if (typeof marked === 'function') return marked(text);
        return text; 
      } catch(e) { return text; }
    };

    const hashPassword = async (password) => {
      if (typeof crypto !== 'undefined' && crypto.subtle) {
        const msgBuffer = new TextEncoder().encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      } else {
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            const char = password.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString();
      }
    };

    const getUserColor = (uid) => {
        if (!uid) return '#6366f1';
        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e', '#84cc16', '#6366f1'];
        let hash = 0;
        for(let i = 0; i < uid.length; i++) hash += uid.charCodeAt(i);
        return colors[hash % colors.length];
    };

    let pyodidePromise = null;
    let monacoPromise = null;

    const usePyodide = () => {
      const [pyodide, setPyodide] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        let isMounted = true;
        window.activeP5Instances = window.activeP5Instances || {};
        window.start_p5_instance = (sketchProxy) => {
          const targetId = window.current_p5_target;
          if (window.activeP5Instances[targetId]) {
            window.activeP5Instances[targetId].remove();
            delete window.activeP5Instances[targetId];
          }
          const container = document.getElementById(targetId);
          if (container) {
            container.innerHTML = '';
            try {
              if (typeof window.p5 !== 'function') throw new Error("p5.js introuvable.");
              window.activeP5Instances[targetId] = new window.p5((p) => {
                  try { sketchProxy(p); } catch(e) { console.error("Erreur exécution proxy p5:", e); }
              }, container);
            } catch(e) {
              console.error("Erreur p5:", e);
              throw e;
            }
          }
        };

        const load = async () => {
          try {
            if (!window.p5_promise) {
              window.p5_promise = fetch('https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js')
                .then(res => res.text())
                .then(text => {
                  const script = document.createElement('script');
                  script.textContent = `(function() { \nvar define = undefined; \nvar exports = undefined; \nvar module = undefined;\n${text}\n})();`;
                  document.head.appendChild(script);
                });
            }

            if (!pyodidePromise) {
              pyodidePromise = new Promise((resolve, reject) => {
                if (typeof globalThis.loadPyodide === 'function') {
                  resolve(globalThis.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" }));
                  return;
                }
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
                script.crossOrigin = 'anonymous';
                script.onload = () => {
                  let attempts = 0;
                  const interval = setInterval(() => {
                    attempts++;
                    if (typeof globalThis.loadPyodide === 'function') {
                      clearInterval(interval);
                      resolve(globalThis.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" }));
                    } else if (attempts > 50) {
                      clearInterval(interval);
                      reject(new Error("loadPyodide introuvable."));
                    }
                  }, 100);
                };
                script.onerror = () => reject(new Error("Erreur réseau pyodide"));
                document.head.appendChild(script);
              });
            }

            await window.p5_promise;
            const py = await pyodidePromise;
            
            if (isMounted) {
              await py.loadPackage("micropip");
              // VERSION ROBUSTE: try/except dans setup et draw pour éviter de crasher le noyau wasm
              const p5_code = `
import js
import __main__
from pyodide.ffi import create_proxy

_current_p = None

def make_proxy_func(name):
    def wrapper(*args, **kwargs):
        if _current_p:
            func = getattr(_current_p, name)
            return func(*args, **kwargs)
    return wrapper

funcs = ['createCanvas', 'background', 'ellipse', 'rect', 'circle', 'fill', 'stroke', 'strokeWeight', 'noFill', 'noStroke', 'line', 'text', 'textSize', 'random', 'clear', 'color', 'arc', 'triangle', 'quad', 'point', 'push', 'pop', 'translate', 'rotate', 'scale', 'map', 'dist', 'frameRate', 'sin', 'cos', 'tan', 'loadImage', 'image', 'createVector']

for name in funcs:
    globals()[name] = make_proxy_func(name)

mouseX, mouseY, pmouseX, pmouseY, width, height, frameCount, keyCode = 0, 0, 0, 0, 0, 0, 0, 0
mouseIsPressed, keyIsPressed, key = False, False, ''

def run():
    setup_fn = getattr(__main__, 'setup', None)
    draw_fn = getattr(__main__, 'draw', None)
    def sketch(p):
        global _current_p
        _current_p = p
        def update_vars():
            __main__.mouseX = getattr(p, 'mouseX', 0)
            __main__.mouseY = getattr(p, 'mouseY', 0)
            __main__.pmouseX = getattr(p, 'pmouseX', 0)
            __main__.pmouseY = getattr(p, 'pmouseY', 0)
            __main__.width = getattr(p, 'width', 0)
            __main__.height = getattr(p, 'height', 0)
            __main__.frameCount = getattr(p, 'frameCount', 0)
            __main__.mouseIsPressed = getattr(p, 'mouseIsPressed', False)
            __main__.keyIsPressed = getattr(p, 'keyIsPressed', False)
            __main__.key = getattr(p, 'key', '')
            __main__.keyCode = getattr(p, 'keyCode', 0)

        def _setup():
            update_vars()
            if setup_fn and callable(setup_fn):
                try:
                    setup_fn()
                except Exception as e:
                    import traceback
                    print(f"Erreur P5 (setup): {e}")

        def _draw():
            update_vars()
            if draw_fn and callable(draw_fn):
                try:
                    draw_fn()
                except Exception as e:
                    import traceback
                    print(f"Erreur P5 (draw): {e}")
                    p.noLoop() # Arrête la boucle pour éviter de spammer la console
            
        p.setup = create_proxy(_setup)
        if draw_fn and callable(draw_fn): 
            p.draw = create_proxy(_draw)

    js.start_p5_instance(create_proxy(sketch))`;
              py.globals.set('p5_code', p5_code);
              await py.runPythonAsync(`with open("p5.py", "w") as f:\n    f.write(p5_code)`);
              setPyodide(py);
              setIsLoading(false);
            }
          } catch (error) {
            console.error("Erreur Pyodide:", error);
            if (isMounted) setIsLoading(false);
          }
        };
        load();
        return () => { isMounted = false; };
      }, []);

      return { pyodide, isPyodideLoading: isLoading };
    };

    const useMonaco = () => {
      const [isReady, setIsReady] = useState(false);
      useEffect(() => {
        let isMounted = true;
        if (!monacoPromise) {
          monacoPromise = new Promise((resolve, reject) => {
            if (window.monaco) { resolve(true); return; }
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js';
            script.crossOrigin = 'anonymous';
            script.onload = () => {
              window.MonacoEnvironment = {
                getWorkerUrl: function (workerId, label) {
                  return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                    self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/' };
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/base/worker/workerMain.js');`
                  )}`;
                }
              };
              window.require.config({ 
                paths: { 
                  'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs',
                  'error-stack-parser': 'https://cdn.jsdelivr.net/npm/error-stack-parser@2.1.4/dist/error-stack-parser.min',
                  'stackframe': 'https://cdn.jsdelivr.net/npm/stackframe@1.3.4/dist/stackframe.min'
                } 
              });
              window.require(['vs/editor/editor.main'], () => resolve(true), (err) => reject(err));
            };
            script.onerror = () => reject(new Error("Erreur de chargement du script Monaco"));
            document.body.appendChild(script);
          });
        }
        monacoPromise.then(() => { if (isMounted) setIsReady(true); }).catch(console.error);
        return () => { isMounted = false; };
      }, []);
      return isReady;
    };

    // --- MONACO EDITOR REFAIT POUR SYNCHRONISATION CHIRURGICALE ---
    const MonacoEditor = ({ cellId, value, onChangeCode, onSilentUpdate, onFocus, onBlur, onRun, language = 'python', readOnly = false, isDark, onCursorChange, remoteCursors = [] }) => {
      const editorContainerRef = useRef(null);
      const editorRef = useRef(null);
      const decorationsCollectionRef = useRef(null);
      const cursorTimeoutRef = useRef(null);
      const isRemoteUpdateRef = useRef(false);

      useEffect(() => {
        if (editorContainerRef.current && !editorRef.current && window.monaco) {
          editorRef.current = window.monaco.editor.create(editorContainerRef.current, {
            value: value,
            language: language,
            theme: isDark ? 'vs-dark' : 'vs',
            minimap: { enabled: false },
            overviewRulerLanes: 0,
            automaticLayout: true,
            scrollBeyondLastLine: false,
            scrollbar: {
                vertical: 'hidden',
                horizontal: 'auto',
                alwaysConsumeMouseWheel: false,
            },
            wordWrap: language === 'python' ? 'off' : 'on',
            fontSize: 14,
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            padding: { top: 12, bottom: 12 },
            readOnly: readOnly,
            renderLineHighlight: 'none',
            occurrencesHighlight: false,
            selectionHighlight: false,  
            matchBrackets: 'never'
          });

          decorationsCollectionRef.current = editorRef.current.createDecorationsCollection([]);

          const updateHeight = () => {
            if (editorRef.current && editorContainerRef.current) {
              const contentHeight = editorRef.current.getContentHeight();
              const finalHeight = Math.max(40, contentHeight);
              editorContainerRef.current.style.height = `${finalHeight}px`;
              editorRef.current.layout();
            }
          };

          editorRef.current.onDidContentSizeChange(updateHeight);
          setTimeout(updateHeight, 0);

          editorRef.current.onDidChangeModelContent((e) => {
              if (isRemoteUpdateRef.current) return;
              onChangeCode(editorRef.current.getValue(), e.changes);
          });
          
          editorRef.current.onDidFocusEditorText(onFocus);
          editorRef.current.onDidBlurEditorText(onBlur);
        }
        return () => {
          if (editorRef.current) {
            editorRef.current.dispose();
            editorRef.current = null;
          }
        };
      }, []);

      useEffect(() => {
        const handleRemoteEdits = (e) => {
            const { code, changes } = e.detail;
            if (editorRef.current && window.monaco) {
                isRemoteUpdateRef.current = true;
                if (changes && changes.length > 0) {
                    const edits = changes.map(change => ({
                        range: new window.monaco.Range(
                            change.range.startLineNumber,
                            change.range.startColumn,
                            change.range.endLineNumber,
                            change.range.endColumn
                        ),
                        text: change.text,
                        forceMoveMarkers: true
                    }));
                    editorRef.current.executeEdits("remote", edits);
                } else {
                    const model = editorRef.current.getModel();
                    editorRef.current.executeEdits("remote", [{
                        range: model.getFullModelRange(),
                        text: code
                    }]);
                }
                isRemoteUpdateRef.current = false;
                onSilentUpdate(editorRef.current.getValue());
            }
        };
        window.addEventListener(`apply_monaco_edits_${cellId}`, handleRemoteEdits);
        return () => window.removeEventListener(`apply_monaco_edits_${cellId}`, handleRemoteEdits);
      }, [cellId]);

      useEffect(() => {
        if (editorRef.current && window.monaco) {
          const currentValue = editorRef.current.getValue();
          if (value !== currentValue && !editorRef.current.hasTextFocus()) {
            isRemoteUpdateRef.current = true;
            editorRef.current.executeEdits("system", [{
                range: editorRef.current.getModel().getFullModelRange(),
                text: value
            }]);
            isRemoteUpdateRef.current = false;
          }
        }
      }, [value]);

      useEffect(() => {
        if (editorRef.current && window.monaco && onCursorChange) {
            const disposable = editorRef.current.onDidChangeCursorSelection((e) => {
                if (cursorTimeoutRef.current) clearTimeout(cursorTimeoutRef.current);
                cursorTimeoutRef.current = setTimeout(() => {
                    onCursorChange({
                        lineNumber: e.selection.positionLineNumber,
                        column: e.selection.positionColumn,
                        selection: e.selection
                    });
                }, 50);
            });
            return () => disposable.dispose();
        }
      }, [onCursorChange]);

      useEffect(() => {
          if (editorRef.current && window.monaco && decorationsCollectionRef.current) {
              const newDecorations = [];
              remoteCursors.forEach(c => {
                  newDecorations.push({
                      range: new window.monaco.Range(c.lineNumber, c.column, c.lineNumber, c.column),
                      options: {
                          className: `remote-cursor-${c.userId}`,
                          stickiness: window.monaco.editor.TrackedRangeStickiness.NeverGrowsWhenTypingAtEdges
                      }
                  });
                  if (c.selection && (c.selection.startLineNumber !== c.selection.endLineNumber || c.selection.startColumn !== c.selection.endColumn)) {
                      newDecorations.push({
                          range: new window.monaco.Range(c.selection.startLineNumber, c.selection.startColumn, c.selection.endLineNumber, c.selection.endColumn),
                          options: { className: `remote-selection-${c.userId}` }
                      });
                  }
              });
              decorationsCollectionRef.current.set(newDecorations);
          }
      }, [remoteCursors]);

      useEffect(() => {
        if (editorRef.current && window.monaco) {
          window.monaco.editor.setModelLanguage(editorRef.current.getModel(), language);
          editorRef.current.updateOptions({ wordWrap: language === 'python' ? 'off' : 'on' });
        }
      }, [language]);

      useEffect(() => {
        if (editorRef.current && window.monaco) {
          editorRef.current.updateOptions({ readOnly: readOnly });
        }
      }, [readOnly]);

      useEffect(() => {
        if (editorRef.current && window.monaco) {
          window.monaco.editor.setTheme(isDark ? 'vs-dark' : 'vs');
        }
      }, [isDark]);

      useEffect(() => {
        let action;
        if (editorRef.current && window.monaco && onRun) {
            action = editorRef.current.addAction({
                id: 'run-cell-shortcut',
                label: 'Run Cell',
                keybindings: [window.monaco.KeyMod.Shift | window.monaco.KeyCode.Enter],
                run: () => { onRun(); }
            });
        }
        return () => { if (action) action.dispose(); };
      }, [onRun]);

      return (
        <div className="w-full relative flex flex-col z-0">
          <div ref={editorContainerRef} className={`w-full ${readOnly ? 'opacity-70' : ''}`} style={{ minHeight: '40px' }} />
        </div>
      );
    };

    // --- CELLULE ---
    const Cell = ({ cell, isSelected, onSelect, onUpdateProperty, onUpdateCode, onUpdateCursor, remoteCursors, pyodide, isPyodideLoading, isMonacoReady, registerRun, handleSnapshot, isDark, hasAdminRights, getNextExecutionCount, isViewer }) => {
      const cellType = cell.type || 'code';
      const isLocked = cell.locked || false;
      const isCode = cellType === 'code';
      
      const [localCode, setLocalCode] = useState(cell.code || '');
      const [isFocused, setIsFocused] = useState(false);
      const [isEditingContent, setIsEditingContent] = useState((cellType === 'markdown' || cellType === 'heading') ? !cell.code : false);

      const enforceLock = isLocked || isViewer;

      useEffect(() => {
        if (cell.code !== localCode) {
           setLocalCode(cell.code);
        }
      }, [cell.code]);

      const handleCodeChange = (newValue, changes) => {
        if (enforceLock) return;
        setLocalCode(newValue); 
        
        if (changes && onUpdateCode) {
            onUpdateCode(cell.id, newValue, changes);
        } else if (onUpdateProperty) {
            onUpdateProperty(cell.id, { code: newValue });
        }
      };

      const handleSilentUpdate = (newValue) => {
        setLocalCode(newValue);
      };

      const handleRun = async () => {
        if (!isCode) {
          setIsEditingContent(false);
          if (handleSnapshot) handleSnapshot();
          onUpdateProperty(cell.id, { code: localCode });
          return;
        }

        if (!pyodide || isPyodideLoading) return;
        
        if (window.activeP5Instances && window.activeP5Instances[`p5-target-${cell.id}`]) {
          window.activeP5Instances[`p5-target-${cell.id}`].remove();
          delete window.activeP5Instances[`p5-target-${cell.id}`];
        }
        window.current_p5_target = `p5-target-${cell.id}`;
        
        const nextCount = getNextExecutionCount();
        onUpdateProperty(cell.id, { status: 'running', output: '', executionCount: nextCount });
        
        let currentOutput = "";
        pyodide.setStdout({ batched: (msg) => currentOutput += msg + "\n" });
        pyodide.setStderr({ batched: (msg) => currentOutput += msg + "\n" });
        
        try {
          // NOUVEAU: Nettoie le cache de p5 de la précédente exécution
          await pyodide.runPythonAsync(`
try:
    if 'setup' in globals(): del globals()['setup']
    if 'draw' in globals(): del globals()['draw']
except Exception:
    pass
          `);
            
          await pyodide.loadPackagesFromImports(localCode);
          await pyodide.runPythonAsync(localCode);
          onUpdateProperty(cell.id, { output: currentOutput || "[Exécuté avec succès]", status: 'idle', executionCount: nextCount });
        } catch (err) {
          let errorMsg = err.toString();
          currentOutput += errorMsg;
          if (errorMsg.includes("ModuleNotFoundError: No module named")) {
            const match = errorMsg.match(/No module named '([^']+)'/);
            if (match) currentOutput += `\n\n💡 ASTUCE :\nSi le module '${match[1]}' existe sur PyPI, utilisez : \nimport micropip\nawait micropip.install('${match[1]}')`;
          }
          onUpdateProperty(cell.id, { output: currentOutput, status: 'error', executionCount: nextCount });
        }
      };

      useEffect(() => {
        if (registerRun) registerRun(cell.id, handleRun);
        return () => { if (registerRun) registerRun(cell.id, null); };
      }, [handleRun, registerRun]);

      const executionLabel = cell.status === 'running' ? '*' : (cell.executionCount || ' ');

      if (isCode) {
        return (
          <div className="flex flex-col sm:flex-row items-start gap-1 sm:gap-4 w-full mt-4 mb-2 group">
            <div className="flex sm:w-20 shrink-0 sm:justify-end pt-1 sm:pt-3 font-mono text-xs sm:text-sm text-primary-600 dark:text-primary-500 select-none pl-1 sm:pl-0">
              Entrée [{executionLabel}]:
            </div>

            <div 
              className={`flex-1 min-w-0 flex flex-col rounded-md overflow-hidden border transition-all ${isSelected ? 'border-primary-500 shadow-md ring-1 ring-primary-500/30' : 'border-gray-300 dark:border-[#3c3c3c]'}`}
              onClick={() => onSelect(cell.id)}
            >
              <div className="flex items-center justify-end bg-gray-100 dark:bg-[#252526] pr-2 py-1 select-none border-b border-gray-200 dark:border-[#3c3c3c]">
                 {isLocked && <Lock size={12} className={`mr-auto ml-2 ${hasAdminRights ? 'text-emerald-500/80' : 'text-amber-500/50'}`} title="Cellule Verrouillée" />}
                 <button onClick={(e) => { e.stopPropagation(); handleRun(); }} disabled={isPyodideLoading || !pyodide} className="p-1.5 text-gray-600 dark:text-[#cccccc] hover:bg-gray-300 dark:hover:bg-[#333333] hover:text-primary-500 rounded transition-colors disabled:opacity-50 flex items-center gap-1 text-xs font-medium" title="Exécuter (Run) ou Maj+Entrée">
                    {cell.status === 'running' ? <Loader2 size={14} className="animate-spin text-amber-500" /> : <Play size={14} />}
                    <span className="hidden sm:inline">Exécuter</span>
                 </button>
              </div>

              <div className={`bg-white dark:bg-[#1e1e1e] ${isLocked ? 'opacity-90' : ''} overflow-hidden`}>
                 {isMonacoReady ? (
                    <MonacoEditor 
                        cellId={cell.id}
                        language="python" 
                        value={localCode} 
                        onChangeCode={handleCodeChange} 
                        onSilentUpdate={handleSilentUpdate}
                        onFocus={() => setIsFocused(true)} 
                        onBlur={() => setIsFocused(false)} 
                        onRun={handleRun} 
                        readOnly={enforceLock} 
                        isDark={isDark} 
                        onCursorChange={(posInfo) => onUpdateCursor(cell.id, posInfo)}
                        remoteCursors={remoteCursors}
                    />
                 ) : (
                    <div className="h-[100px] flex items-center justify-center text-gray-500 dark:text-slate-500">Chargement de l'éditeur...</div>
                 )}
              </div>

              <div className="bg-white dark:bg-[#1e1e1e]">
                 <div id={`p5-target-${cell.id}`} className="empty:hidden flex justify-center bg-white w-full overflow-x-auto border-t border-gray-200 dark:border-[#3c3c3c]"></div>
                 
                 {(cell.output || cell.status === 'running') && (
                    <div className="border-t border-gray-200 dark:border-[#3c3c3c] bg-gray-50 dark:bg-[#181818] p-3">
                       <div className="flex items-center gap-2 mb-2 text-gray-500 dark:text-[#cccccc] uppercase tracking-wider text-[10px] font-semibold">
                          {cell.status === 'error' ? <XCircle size={12} className="text-red-500 dark:text-red-400" /> : 
                           cell.status === 'running' ? <Loader2 size={12} className="animate-spin text-amber-500" /> : 
                           <Terminal size={12} />}
                          Terminal
                          <span className="ml-auto lowercase text-gray-400 dark:text-[#808080] font-mono">
                             {cell.status === 'running' ? 'exécuté avec python 3' : 'terminé'}
                          </span>
                       </div>
                       <pre className={`font-mono text-xs sm:text-sm overflow-x-auto custom-scrollbar max-h-96 whitespace-pre-wrap ${cell.status === 'error' ? 'text-red-600 dark:text-[#f48771]' : 'text-gray-800 dark:text-[#cccccc]'}`}>
                           {cell.status === 'running' && !cell.output ? <span className="animate-pulse opacity-50">Exécution en cours...</span> : cell.output}
                       </pre>
                    </div>
                 )}
              </div>
            </div>
          </div>
        );
      }

      const alignClass = cell.align === 'center' ? 'text-center' : cell.align === 'right' ? 'text-right' : 'text-left';

      return (
        <div className="flex flex-col sm:flex-row items-start gap-1 sm:gap-4 w-full mt-4 mb-2">
          <div className="hidden sm:block sm:w-20 shrink-0"></div>
          
          <div 
            className={`flex-1 min-w-0 p-1 rounded-lg border transition-all ${isSelected ? 'border-primary-500 shadow-sm bg-white dark:bg-[#1e1e1e]' : 'border-transparent hover:border-gray-200 dark:hover:border-slate-800'}`}
            onClick={() => onSelect(cell.id)}
          >
            <div className={`relative ${isLocked ? 'bg-gray-50 dark:bg-slate-900/30 rounded' : ''}`}>
               
               {isLocked && <Lock size={12} className={`absolute top-2 right-2 ${hasAdminRights ? 'text-emerald-500/80' : 'text-amber-500/50'}`} title={hasAdminRights ? "Verrouillé (Ignoré)" : "Verrouillé"} />}

               {cellType === 'markdown' && !isEditingContent && (
                 <div 
                   className={`p-4 prose dark:prose-invert max-w-none min-h-[40px] cursor-text ${alignClass}`}
                   onDoubleClick={() => { if(!enforceLock) setIsEditingContent(true); }}
                   dangerouslySetInnerHTML={{ __html: safeMarked(localCode || '*Double-cliquez ici pour éditer...*') }}
                 />
               )}

               {cellType === 'heading' && !isEditingContent && (
                 <div 
                   className={`px-4 py-4 cursor-text ${alignClass}`}
                   onDoubleClick={() => { if(!enforceLock) setIsEditingContent(true); }}
                 >
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-slate-100">{localCode || 'Titre vide (double-cliquez pour éditer)'}</h2>
                 </div>
               )}

               {(cellType === 'raw' || isEditingContent) && (
                 isMonacoReady ? (
                   <div className="border border-gray-200 dark:border-[#3c3c3c] rounded overflow-hidden">
                     <MonacoEditor 
                        cellId={cell.id}
                        language={cellType === 'markdown' || cellType === 'heading' ? 'markdown' : 'plaintext'} 
                        value={localCode} 
                        onChangeCode={handleCodeChange} 
                        onSilentUpdate={handleSilentUpdate}
                        onFocus={() => setIsFocused(true)} 
                        onBlur={() => setIsFocused(false)} 
                        onRun={handleRun} 
                        readOnly={enforceLock} 
                        isDark={isDark} 
                     />
                   </div>
                 ) : (
                   <div className="h-[100px] flex items-center justify-center text-gray-500 dark:text-slate-500">Chargement...</div>
                 )
               )}
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [serverData, setServerData] = useState({ users: [], notebooks: [], cells: [], cursors: {} });
      const [activeUsers, setActiveUsers] = useState([]);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [remoteCursorsState, setRemoteCursorsState] = useState({});
      
      const [currentNbId, setCurrentNbId] = useState(null);
      const [selectedCellId, setSelectedCellId] = useState(null);
      const [viewingUser, setViewingUser] = useState(null);

      const [isDark, setIsDark] = useState(true);
      const [themeColor, setThemeColor] = useState('indigo');
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [clipboardCell, setClipboardCell] = useState(null);
      const [isCodeModalOpen, setIsCodeModalOpen] = useState(false);
      const [codePermissions, setCodePermissions] = useState({ canUnlock: true, canCreate: true, canShare: true, canGenerateCode: true });

      const [searchQuery, setSearchQuery] = useState('');
      const [shareUsername, setShareUsername] = useState('');
      const [showShareSuggestions, setShowShareSuggestions] = useState(false);

      const getThemeHex = (color) => {
        const colors = { indigo: '#6366f1', emerald: '#10b981', rose: '#f43f5e', amber: '#f59e0b', purple: '#a855f7' };
        return colors[color] || '#6366f1';
      };

      const [authMode, setAuthMode] = useState('login'); 
      const [inputUsername, setInputUsername] = useState('');
      const [inputPassword, setInputPassword] = useState('');
      const [inputPasswordConfirm, setInputPasswordConfirm] = useState('');
      
      const [joinCode, setJoinCode] = useState('');
      const [isSharing, setIsSharing] = useState(false);
      const [isEditingTitle, setIsEditingTitle] = useState(false);
      const [editTitle, setEditTitle] = useState('');
      
      const [isProfileOpen, setIsProfileOpen] = useState(false);
      const [profileForm, setProfileForm] = useState({ username: '', email: '', description: '', oldPassword: '', newPassword: '' });

      const [historyPast, setHistoryPast] = useState([]);
      const [historyFuture, setHistoryFuture] = useState([]);

      const fileInputRef = useRef(null);
      const fileInputCurrentRef = useRef(null);
      const cellRunRefs = useRef({});

      const { pyodide, isPyodideLoading } = usePyodide();
      const isMonacoReady = useMonaco();
      const socketRef = useRef(null);

      useEffect(() => {
        let uid = localStorage.getItem('collab_notebook_uid');
        if (uid) setUser({ uid });

        const savedTheme = localStorage.getItem('collab_theme');
        if (savedTheme === 'light') setIsDark(false);
        const savedColor = localStorage.getItem('collab_color');
        if (savedColor) setThemeColor(savedColor);

        setIsAuthLoading(false);
      }, []);

      useEffect(() => {
        document.documentElement.className = isDark ? 'dark' : '';
        const themeClass = themeColor !== 'indigo' ? `theme-${themeColor}` : '';
        document.body.className = `bg-gray-50 dark:bg-[#1e1e1e] text-slate-900 dark:text-[#cccccc] m-0 p-0 transition-colors duration-200 ${themeClass}`;
        localStorage.setItem('collab_theme', isDark ? 'dark' : 'light');
        localStorage.setItem('collab_color', themeColor);
      }, [isDark, themeColor]);

      useEffect(() => {
        const forceOpen = localStorage.getItem('collab_open_nb');
        if (forceOpen && serverData.notebooks?.some(n => n.id === forceOpen)) {
            setCurrentNbId(forceOpen);
            localStorage.removeItem('collab_open_nb');
        }
      }, [serverData.notebooks]);

      const applyActionToState = (state, action) => {
          const next = { ...state };
          switch(action.type) {
              case 'ADD_CELL': next.cells = [...(next.cells||[]), action.payload]; break;
              case 'DELETE_CELL': next.cells = (next.cells||[]).filter(c => c.id !== action.payload.cellId); break;
              case 'UPDATE_CELL': next.cells = (next.cells||[]).map(c => c.id === action.payload.cellId ? { ...c, ...action.payload.data } : c); break;
              case 'UPDATE_CELLS':
                  let updatedCells = [...(next.cells||[])];
                  action.payload.forEach(update => { updatedCells = updatedCells.map(c => c.id === update.cellId ? { ...c, ...update.data } : c); });
                  next.cells = updatedCells; break;
              case 'ADD_NOTEBOOK': next.notebooks = [...(next.notebooks||[]), action.payload]; break;
              case 'UPDATE_NOTEBOOK': next.notebooks = (next.notebooks||[]).map(n => n.id === action.payload.notebookId ? { ...n, ...action.payload.data } : n); break;
              case 'DELETE_NOTEBOOK':
                  next.notebooks = (next.notebooks||[]).filter(n => n.id !== action.payload.notebookId);
                  next.cells = (next.cells||[]).filter(c => c.notebookId !== action.payload.notebookId); break;
              case 'DELETE_NOTEBOOKS':
                  const nIds = action.payload.notebookIds;
                  next.notebooks = (next.notebooks||[]).filter(n => !nIds.includes(n.id));
                  next.cells = (next.cells||[]).filter(c => !nIds.includes(c.notebookId)); break;
              case 'ADD_USER': next.users = [...(next.users||[]), action.payload]; break;
              case 'UPDATE_USER': next.users = (next.users||[]).map(u => u.id === action.payload.userId ? { ...u, ...action.payload.data } : u); break;
          }
          localStorage.setItem('collab_local_db', JSON.stringify(next));
          return next;
      };

      const dispatchServerAction = (action) => {
          setServerData(prev => applyActionToState(prev, action)); 
          if (socketRef.current) socketRef.current.emit('action', action); 
      };

      const updateServerFullSync = (mutationFn) => {
        setServerData(prevData => {
          const newData = mutationFn(prevData);
          if (socketRef.current) socketRef.current.emit('update_data', newData);
          localStorage.setItem('collab_local_db', JSON.stringify(newData)); 
          return newData; 
        });
      };

      // Fonction propre pour injecter les styles de curseurs distants (Évite les lags)
      const injectCursorStyle = (uid, username, color) => {
          const styleId = `cursor-style-${uid}`;
          if (!document.getElementById(styleId)) {
              const style = document.createElement('style');
              style.id = styleId;
              style.innerHTML = `
                .remote-cursor-${uid} { border-left: 2px solid ${color} !important; position: absolute; z-index: 10; margin-left: -1px; }
                .remote-cursor-${uid}::after { content: "${username}"; position: absolute; top: -16px; left: 0px; background-color: ${color}; color: white; font-size: 10px; padding: 1px 4px; border-radius: 3px; white-space: nowrap; pointer-events: none; opacity: 0.9; }
                .remote-selection-${uid} { background-color: ${color}40 !important; }
              `;
              document.head.appendChild(style);
          }
      };

      useEffect(() => {
        if (typeof window.io === 'function') {
          socketRef.current = window.io();
          
          socketRef.current.on('data_updated', (newData) => {
            setServerData(newData);
            localStorage.setItem('collab_local_db', JSON.stringify(newData));
          });

          socketRef.current.on('action_received', (action) => {
              setServerData(prev => applyActionToState(prev, action));
          });

          socketRef.current.on('remote_cell_edits', ({ cellId, code, changes }) => {
              window.dispatchEvent(new CustomEvent(`apply_monaco_edits_${cellId}`, { detail: { code, changes } }));
              setServerData(prev => applyActionToState(prev, { type: 'UPDATE_CELL', payload: { cellId, data: { code } } }));
          });

          socketRef.current.on('cursor_updated', (c) => {
            injectCursorStyle(c.userId, c.username, c.color);
            setRemoteCursorsState(prev => ({ ...prev, [c.userId]: c }));
          });

          socketRef.current.on('active_users_update', (usersList) => {
            setActiveUsers(usersList);
          });
        }

        const localDb = localStorage.getItem('collab_local_db');
        if (localDb) {
            try { setServerData(JSON.parse(localDb)); } catch(e){}
        }

        try {
          fetch(window.location.protocol === 'blob:' ? 'db.json' : './api/data')
            .then(res => {
                if (!res.ok) throw new Error("API indisponible");
                return res.json();
            })
            .then(data => {
                setServerData(data);
                localStorage.setItem('collab_local_db', JSON.stringify(data));
            })
            .catch(err => console.warn("API serveur indisponible, mode local utilisé :", err));
        } catch (err) {
            console.warn("Environnement statique détecté, API serveur ignorée.");
        }

        return () => { if (socketRef.current) socketRef.current.disconnect(); };
      }, []);

      useEffect(() => {
          const interval = setInterval(() => {
              const now = Date.now();
              setRemoteCursorsState(prev => {
                  let changed = false;
                  const next = { ...prev };
                  for (const uid in next) {
                      if (now - next[uid].timestamp > 10000) { delete next[uid]; changed = true; }
                  }
                  return changed ? next : prev;
              });
          }, 5000);
          return () => clearInterval(interval);
      }, []);

      useEffect(() => {
          if (currentNbId && user && socketRef.current && serverData.users && serverData.users.length > 0) {
              const uData = serverData.users.find(u => u.id === user.uid);
              if (uData) {
                  socketRef.current.emit('join_notebook', { 
                      notebookId: currentNbId, 
                      user: { uid: uData.id, username: uData.username, color: getUserColor(uData.id) } 
                  });
              }
          } else if (!currentNbId && socketRef.current) {
              socketRef.current.emit('leave_notebook');
              setActiveUsers([]);
          }
      }, [currentNbId, user, serverData.users]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
             if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return; 
             e.preventDefault();
             if (e.shiftKey) document.getElementById('btn-redo')?.click();
             else document.getElementById('btn-undo')?.click();
          }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
             if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
             e.preventDefault();
             document.getElementById('btn-redo')?.click();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      const handleUpdateCursor = (cellId, positionInfo) => {
          if (!user || !currentNbId || !userData) return;
          const cursorData = {
              userId: user.uid,
              cellId,
              lineNumber: positionInfo.lineNumber,
              column: positionInfo.column,
              selection: positionInfo.selection,
              username: userData.username,
              color: getUserColor(user.uid),
              timestamp: Date.now()
          };
          if (socketRef.current) socketRef.current.emit('cursor_moved', cursorData);
      };

      const handleSnapshot = () => {
        if (!currentNbId) return;
        setServerData(currentData => {
           const currentNbCells = (currentData.cells || []).filter(c => c.notebookId === currentNbId);
           const newStateStr = JSON.stringify(currentNbCells);
           setHistoryPast(p => {
               if (p.length > 0 && p[p.length - 1] === newStateStr) return p;
               return [...p, newStateStr].slice(-20);
           });
           setHistoryFuture([]);
           return currentData;
        });
      };

      const handleUndo = () => {
        if (historyPast.length === 0 || !currentNbId) return;
        updateServerFullSync(currentData => {
           const previousStateStr = historyPast[historyPast.length - 1];
           const previousCells = JSON.parse(previousStateStr);
           
           const currentNbCells = (currentData.cells || []).filter(c => c.notebookId === currentNbId);
           setHistoryFuture(f => [JSON.stringify(currentNbCells), ...f]);
           setHistoryPast(p => p.slice(0, -1));
           
           const otherCells = (currentData.cells || []).filter(c => c.notebookId !== currentNbId);
           return { ...currentData, cells: [...otherCells, ...previousCells] };
        });
        setSelectedCellId(null);
      };

      const handleRedo = () => {
        if (historyFuture.length === 0 || !currentNbId) return;
        updateServerFullSync(currentData => {
           const nextStateStr = historyFuture[0];
           const nextCells = JSON.parse(nextStateStr);
           
           const currentNbCells = (currentData.cells || []).filter(c => c.notebookId === currentNbId);
           setHistoryPast(p => [...p, JSON.stringify(currentNbCells)]);
           setHistoryFuture(f => f.slice(1));
           
           const otherCells = (currentData.cells || []).filter(c => c.notebookId !== currentNbId);
           return { ...currentData, cells: [...otherCells, ...nextCells] };
        });
        setSelectedCellId(null);
      };

      const handleAuth = async (e) => {
        e.preventDefault();
        const trimmedUsername = inputUsername.trim();
        if (!trimmedUsername || !inputPassword) return;

        if (authMode === 'register') {
          if (inputPassword !== inputPasswordConfirm) { alert("Les mots de passe ne correspondent pas !"); return; }
        }

        const hashed = await hashPassword(inputPassword);

        if (authMode === 'register') {
          if ((serverData.users || []).some(u => u.username.toLowerCase() === trimmedUsername.toLowerCase())) { 
            alert("Ce pseudo est déjà pris !"); return; 
          }
          const newUid = generateUUID();
          dispatchServerAction({
              type: 'ADD_USER',
              payload: { id: newUid, username: trimmedUsername, password: hashed, email: '', description: '', role: 'eleve' }
          });
          localStorage.setItem('collab_notebook_uid', newUid);
          setUser({ uid: newUid });
        } else {
          const existingUser = (serverData.users || []).find(u => u.username.toLowerCase() === trimmedUsername.toLowerCase());
          if (!existingUser || existingUser.password !== hashed) { alert("Identifiants incorrects !"); return; }
          localStorage.setItem('collab_notebook_uid', existingUser.id);
          setUser({ uid: existingUser.id });
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('collab_notebook_uid');
        setUser(null); setCurrentNbId(null); setSelectedCellId(null);
        setInputUsername(''); setInputPassword(''); setInputPasswordConfirm('');
        setHistoryPast([]); setHistoryFuture([]);
      };

      const handleSaveProfile = async (e) => {
        e.preventDefault();
        const trimmedUsername = profileForm.username.trim();
        const userData = (serverData.users || []).find(u => u.id === user.uid);
        if (!userData || !trimmedUsername) return;

        let hashedPw = userData.password;
        if (profileForm.newPassword) {
            if (!profileForm.oldPassword) { alert("Veuillez entrer votre ancien mot de passe pour le modifier."); return; }
            const oldHashed = await hashPassword(profileForm.oldPassword);
            if (oldHashed !== userData.password) { alert("L'ancien mot de passe est incorrect !"); return; }
            hashedPw = await hashPassword(profileForm.newPassword);
        }

        updateServerFullSync(data => {
            if (trimmedUsername !== userData.username && (data.users || []).some(u => u.id !== user.uid && u.username.toLowerCase() === trimmedUsername.toLowerCase())) {
                alert("Ce pseudo est déjà pris !"); return data; 
            }
            const newUsers = (data.users || []).map(u => u.id === user.uid ? { ...u, username: trimmedUsername, password: hashedPw, email: profileForm.email, description: profileForm.description } : u);
            let newNotebooks = (data.notebooks || []);
            if (trimmedUsername !== userData.username) {
                newNotebooks = newNotebooks.map(nb => {
                    let updatedNb = { ...nb };
                    if (nb.ownerUid === user.uid) updatedNb.ownerUsername = trimmedUsername;
                    if (nb.sharedWith.includes(userData.username)) {
                        updatedNb.sharedWith = nb.sharedWith.map(name => name === userData.username ? trimmedUsername : name);
                    }
                    return updatedNb;
                });
            }
            return { ...data, users: newUsers, notebooks: newNotebooks };
        });
        setIsProfileOpen(false);
      };

      const handleCreateNotebook = () => {
        const myData = (serverData.users || []).find(u => u.id === user.uid);
        if (!user || !myData) return;
        const inputTitle = prompt("Nom du notebook ?");
        if (inputTitle === null) return; 
        const title = inputTitle.trim() || "Nouveau Notebook";
        const newNbId = generateUUID();
        dispatchServerAction({
            type: 'ADD_NOTEBOOK',
            payload: { id: newNbId, title, ownerUid: user.uid, ownerUsername: myData.username, sharedWith: [], createdAt: new Date().toISOString() }
        });
        setCurrentNbId(newNbId);
        setHistoryPast([]); setHistoryFuture([]); setSelectedCellId(null);
      };

      const handleJoinByCode = (e) => {
        e.preventDefault();
        const code = joinCode.trim().toUpperCase();
        if (!code) return;

        if (code === '1435') {
            dispatchServerAction({ type: 'UPDATE_USER', payload: { userId: user.uid, data: { role: 'admin' } } });
            alert("🔐 Succès : Privilèges Administrateur !"); setJoinCode(''); return;
        }
        if (code === 'PROFCOLLAB') {
            dispatchServerAction({ type: 'UPDATE_USER', payload: { userId: user.uid, data: { role: 'prof' } } });
            alert("🎓 Succès : Privilèges Professeur !"); setJoinCode(''); return;
        }

        const templateNb = (serverData.notebooks || []).find(n => n.accessCode === code);
        if (!templateNb) { alert("Code invalide."); return; }

        const myData = (serverData.users || []).find(u => u.id === user.uid);
        const newNbId = generateUUID();
        const templateCells = (serverData.cells || []).filter(c => c.notebookId === templateNb.id);
        const newCells = templateCells.map(c => ({ ...c, id: generateUUID(), notebookId: newNbId, output: '', status: 'idle', locked: c.locked, executionCount: null }));

        updateServerFullSync(data => {
          const newNb = { 
            id: newNbId, title: `Exercice : ${templateNb.title}`, ownerUid: user.uid, ownerUsername: myData.username, sharedWith: [], createdAt: new Date().toISOString(),
            permissions: templateNb.studentPermissions || { canUnlock: true, canCreate: true, canShare: true, canGenerateCode: true },
            templateSourceId: templateNb.id, templateOwnerUid: templateNb.ownerUid
          };
          return { ...data, notebooks: [...(data.notebooks || []), newNb], cells: [...(data.cells || []), ...newCells] };
        });
        setCurrentNbId(newNbId); setJoinCode('');
        setHistoryPast([]); setHistoryFuture([]); setSelectedCellId(null);
      };

      const openCodeModal = () => {
          const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
          if (activeNotebook) {
              setCodePermissions(activeNotebook.studentPermissions || { canUnlock: true, canCreate: true, canShare: true, canGenerateCode: true });
              setIsCodeModalOpen(true);
          }
      };

      const handleGenerateAccessCode = () => {
        if (!currentNbId) return;
        let code = Math.random().toString(36).substring(2, 8).toUpperCase();
        dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { accessCode: code, studentPermissions: codePermissions } } });
      };

      const handleDisableAccessCode = () => {
          if (!currentNbId) return;
          dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { accessCode: null } } });
      };

      const handleSavePermissions = () => {
          if (!currentNbId) return;
          dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { studentPermissions: codePermissions } } });
          setIsCodeModalOpen(false);
      };

      const processImportedFile = (fileContent, title, targetNbId) => {
        const ipynb = JSON.parse(fileContent);
        const importedCells = [];
        let currentOrder = 10;
        if (ipynb.cells && Array.isArray(ipynb.cells)) {
          ipynb.cells.forEach(cell => {
            let code = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');
            let cellType = 'code';
            if (cell.cell_type === 'markdown') cellType = 'markdown';
            else if (cell.cell_type === 'raw') cellType = 'raw';
            else if (cell.cell_type === 'heading') cellType = 'heading';
            
            let executionCount = cell.execution_count || null;
            let output = '';
            if (cell.outputs && cell.outputs.length > 0) {
               output = cell.outputs.map(o => o.text ? (Array.isArray(o.text) ? o.text.join('') : o.text) : '').join('');
            }
            
            importedCells.push({ id: generateUUID(), notebookId: targetNbId, code: code, type: cellType, output: output, status: 'idle', order: currentOrder, locked: false, executionCount: executionCount });
            currentOrder += 10;
          });
        }
        if (importedCells.length === 0) importedCells.push({ id: generateUUID(), notebookId: targetNbId, code: '', type: 'code', output: '', status: 'idle', order: 10 });
        return importedCells;
      };

      const handleImportNotebook = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const myData = (serverData.users || []).find(u => u.id === user.uid);
            if (!user || !myData) return;
            const newNbId = generateUUID();
            const title = file.name.replace(/\.ipynb$/i, '');
            const importedCells = processImportedFile(event.target.result, title, newNbId);

            updateServerFullSync(data => {
              const newNb = { id: newNbId, title: title, ownerUid: user.uid, ownerUsername: myData.username, sharedWith: [], createdAt: new Date().toISOString() };
              return { ...data, notebooks: [...(data.notebooks || []), newNb], cells: [...(data.cells || []), ...importedCells] };
            });
            setCurrentNbId(newNbId);
            setHistoryPast([]); setHistoryFuture([]); setSelectedCellId(null);
          } catch (err) { alert("Erreur d'importation. Fichier invalide."); }
          e.target.value = null;
        };
        reader.readAsText(file);
      };

      const handleImportIntoCurrentNotebook = (e) => {
        const file = e.target.files[0];
        if (!file || !currentNbId) return;
        if (!window.confirm("Remplacer tout le contenu actuel par le fichier importé ?")) { e.target.value = null; return; }
        
        handleSnapshot(); 
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const title = file.name.replace(/\.ipynb$/i, '');
            const importedCells = processImportedFile(event.target.result, title, currentNbId);
            updateServerFullSync(data => {
              const filteredCells = (data.cells || []).filter(c => c.notebookId !== currentNbId);
              const updatedNotebooks = (data.notebooks || []).map(n => n.id === currentNbId ? { ...n, title: title } : n);
              return { ...data, notebooks: updatedNotebooks, cells: [...filteredCells, ...importedCells] };
            });
            setSelectedCellId(null);
          } catch (err) { alert("Erreur d'importation."); }
          e.target.value = null;
        };
        reader.readAsText(file);
      };

      const handleRenameNotebook = (newTitle) => {
        if (!newTitle.trim() || !user || !currentNbId) return setIsEditingTitle(false);
        const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
        const userData = (serverData.users || []).find(u => u.id === user.uid);
        const hasAdminRights = userData?.role === 'admin' || userData?.role === 'prof';
        if (activeNotebook?.ownerUid !== user.uid && !hasAdminRights) { alert("Seul le propriétaire peut renommer."); setIsEditingTitle(false); return; }
        
        dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { title: newTitle.trim() } } });
        setIsEditingTitle(false);
      };

      const handleDeleteNotebook = (e, nbId) => {
        if (e) { e.preventDefault(); e.stopPropagation(); }
        if (window.confirm("Êtes-vous sûr de vouloir supprimer définitivement ce notebook ?")) {
          dispatchServerAction({ type: 'DELETE_NOTEBOOK', payload: { notebookId: nbId } });
          if (currentNbId === nbId) { setCurrentNbId(null); setSelectedCellId(null); setHistoryPast([]); setHistoryFuture([]); }
        }
      };

      const handleAddShare = (e) => {
        e.preventDefault();
        if (!currentNbId || !shareUsername.trim()) return;
        const targetUser = (serverData.users || []).find(u => u.username.toLowerCase() === shareUsername.toLowerCase());
        if (!targetUser) { alert("Utilisateur introuvable !"); return; }
        
        const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
        if (activeNotebook && !activeNotebook.sharedWith.includes(targetUser.username)) {
            const newPermissions = { ...(activeNotebook.userPermissions || {}) };
            newPermissions[targetUser.username] = 'viewer';
            dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { sharedWith: [...activeNotebook.sharedWith, targetUser.username], userPermissions: newPermissions } } });
        }
        setShareUsername('');
      };

      const handleChangeShareRole = (usernameToChange, newRole) => {
        if (!currentNbId) return;
        const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
        if (activeNotebook && activeNotebook.sharedWith.includes(usernameToChange)) {
            const newPermissions = { ...(activeNotebook.userPermissions || {}) };
            newPermissions[usernameToChange] = newRole;
            dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { userPermissions: newPermissions } } });
        }
      };

      const handleRemoveShare = (usernameToRemove) => {
        if (!currentNbId) return;
        const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
        if (activeNotebook) {
            dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: currentNbId, data: { sharedWith: activeNotebook.sharedWith.filter(u => u !== usernameToRemove) } } });
        }
      };

      const handleRestartKernel = async () => {
        if (!pyodide) return;
        if (window.confirm("Voulez-vous redémarrer l'exécuteur Python ? Toutes les variables en mémoire seront effacées.")) {
            await pyodide.runPythonAsync(`
for key in list(globals().keys()):
    if key not in ['__name__', '__doc__', '__package__', '__loader__', '__spec__', '__annotations__', '__builtins__', 'js', 'pyodide', 'create_proxy']:
        del globals()[key]
            `);
            for (let key in window.activeP5Instances) { window.activeP5Instances[key].remove(); }
            window.activeP5Instances = {};
            alert("✅ Noyau redémarré avec succès.");
        }
      };

      const handleRunAllCells = async () => {
        if (!pyodide || isPyodideLoading) return;
        const activeCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId).sort((a, b) => a.order - b.order);
        for (const cell of activeCells) {
          if (cell.type === 'code' && cellRunRefs.current[cell.id]) {
            await cellRunRefs.current[cell.id](); 
          }
        }
      };

      const registerCellRun = (id, runFn) => {
        if (runFn) cellRunRefs.current[id] = runFn;
        else delete cellRunRefs.current[id];
      };

      const handleAddCell = (top = false) => {
        if (!user || !currentNbId) return;
        handleSnapshot();
        const newCellId = generateUUID();
        const nbCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId);
        let newOrder = 10;
        if (nbCells.length > 0) {
            if (top) newOrder = Math.min(...nbCells.map(c => c.order)) - 10;
            else newOrder = Math.max(...nbCells.map(c => c.order)) + 10;
        }
        const newCell = { id: newCellId, notebookId: currentNbId, code: '', type: 'code', output: '', status: 'idle', order: newOrder, locked: false, executionCount: null };
        
        dispatchServerAction({ type: 'ADD_CELL', payload: newCell });
        setSelectedCellId(newCellId);
      };

      const handleMoveCell = (cellId, direction) => {
        const nbCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId).sort((a, b) => a.order - b.order);
        const index = nbCells.findIndex(c => c.id === cellId);
        if (index === -1) return;
        
        let targetCell = null;
        if (direction === 'up' && index > 0) targetCell = nbCells[index - 1];
        else if (direction === 'down' && index < nbCells.length - 1) targetCell = nbCells[index + 1];
        if (!targetCell) return;

        handleSnapshot();
        dispatchServerAction({ type: 'UPDATE_CELLS', payload: [
            { cellId, data: { order: targetCell.order } },
            { cellId: targetCell.id, data: { order: nbCells[index].order } }
        ]});
      };

      const handleDeleteCell = (cellId) => {
        handleSnapshot();
        dispatchServerAction({ type: 'DELETE_CELL', payload: { cellId } });
        if (selectedCellId === cellId) setSelectedCellId(null);
      };

      const handleUpdateCellProperty = (cellId, dataToUpdate) => {
         dispatchServerAction({ type: 'UPDATE_CELL', payload: { cellId, data: dataToUpdate } });
      };

      const handleUpdateCellCode = (cellId, fullCode, changes) => {
         setServerData(prev => applyActionToState(prev, { type: 'UPDATE_CELL', payload: { cellId, data: { code: fullCode } } }));
         if (socketRef.current) {
            socketRef.current.emit('cell_edit_operations', { cellId, code: fullCode, changes });
         }
      };

      // NOUVEAU: Génération propre d'un vrai fichier .ipynb formaté Jupyter
      const handleDownload = () => {
        const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
        const nbCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId).sort((a, b) => a.order - b.order);
        
        const ipynb = {
          metadata: {
            language_info: { name: "python", version: "3" },
            collab_notebook: { title: activeNotebook?.title || "Notebook" }
          },
          nbformat: 4,
          nbformat_minor: 4,
          cells: nbCells.map((c) => {
             const cellType = (c.type === 'markdown' || c.type === 'heading') ? 'markdown' : (c.type === 'raw' ? 'raw' : 'code');
             const sourceLines = c.code ? c.code.split('\n').map((line, i, arr) => line + (i < arr.length - 1 ? '\n' : '')) : [];
             
             let cell = {
               cell_type: cellType,
               metadata: {},
               source: sourceLines
             };
             
             if (cellType === 'code') {
               cell.execution_count = c.executionCount || null;
               cell.outputs = c.output ? [
                  {
                     name: "stdout",
                     output_type: "stream",
                     text: c.output.split('\n').map((line, i, arr) => line + (i < arr.length - 1 ? '\n' : ''))
                  }
               ] : [];
             }
             return cell;
          })
        };
        
        const blob = new Blob([JSON.stringify(ipynb, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${activeNotebook?.title || 'notebook_export'}.ipynb`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleCopyCell = () => {
          const selectedCell = (serverData.cells || []).find(c => c.id === selectedCellId);
          if (!selectedCell) return;
          setClipboardCell({ ...selectedCell, id: undefined, notebookId: undefined, output: '', status: 'idle', executionCount: null });
      };

      const handleCutCell = () => {
          const selectedCell = (serverData.cells || []).find(c => c.id === selectedCellId);
          if (!selectedCell) return;
          const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
          const userData = (serverData.users || []).find(u => u.id === user.uid);
          const hasAdminRights = userData?.role === 'admin' || userData?.role === 'prof';
          if (selectedCell.locked && (!activeNotebook?.permissions || activeNotebook.permissions.canUnlock === false) && !hasAdminRights) return;
          
          setClipboardCell({ ...selectedCell, id: undefined, notebookId: undefined, output: '', status: 'idle', executionCount: null });
          handleDeleteCell(selectedCell.id);
      };

      const handlePasteCell = () => {
          if (!clipboardCell || !currentNbId) return;
          handleSnapshot();
          const newCellId = generateUUID();
          const nbCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId).sort((a, b) => a.order - b.order);
          let insertOrder = 10;
          if (selectedCellId) {
              const selIndex = nbCells.findIndex(c => c.id === selectedCellId);
              if (selIndex !== -1) {
                  if (selIndex === nbCells.length - 1) { insertOrder = nbCells[selIndex].order + 10; } 
                  else { insertOrder = (nbCells[selIndex].order + nbCells[selIndex+1].order) / 2; }
              }
          } else if (nbCells.length > 0) {
              insertOrder = nbCells[nbCells.length - 1].order + 10;
          }
          const newCell = { ...clipboardCell, id: newCellId, notebookId: currentNbId, order: insertOrder };
          dispatchServerAction({ type: 'ADD_CELL', payload: newCell });
          setSelectedCellId(newCellId);
      };

      const [selectedNotebooks, setSelectedNotebooks] = useState(new Set());

      const formatDate = (ts) => {
          if (!ts) return 'Inconnu';
          return new Date(ts).toLocaleString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
      };

      const openNotebook = (nbId) => {
          setCurrentNbId(nbId);
          setHistoryPast([]); setHistoryFuture([]); setSelectedCellId(null);
          dispatchServerAction({ type: 'UPDATE_NOTEBOOK', payload: { notebookId: nbId, data: { lastAccessed: Date.now() } } });
      };

      const handleToggleSelectNotebook = (e, nbId) => {
          e.stopPropagation();
          const next = new Set(selectedNotebooks);
          if (next.has(nbId)) next.delete(nbId);
          else next.add(nbId);
          setSelectedNotebooks(next);
      };

      const handleBulkDelete = () => {
          if (selectedNotebooks.size === 0) return;
          if (window.confirm(`Supprimer définitivement les ${selectedNotebooks.size} notebooks sélectionnés ?`)) {
              const ids = Array.from(selectedNotebooks);
              dispatchServerAction({ type: 'DELETE_NOTEBOOKS', payload: { notebookIds: ids } });
              if (ids.includes(currentNbId)) { setCurrentNbId(null); setSelectedCellId(null); setHistoryPast([]); setHistoryFuture([]); }
              setSelectedNotebooks(new Set());
          }
      };

      const getNextExecutionCount = () => {
          const nbCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId);
          const maxCount = Math.max(0, ...nbCells.map(c => c.executionCount || 0));
          return maxCount + 1;
      };

      const userData = user ? (serverData.users || []).find(u => u.id === user.uid) : null;
      const myNotebooks = (serverData.notebooks || []).filter(n => n.ownerUid === user?.uid);
      const sharedNotebooks = userData ? (serverData.notebooks || []).filter(n => n.sharedWith.includes(userData.username)) : [];
      const activeNotebook = (serverData.notebooks || []).find(n => n.id === currentNbId);
      const activeCells = (serverData.cells || []).filter(c => c.notebookId === currentNbId).sort((a, b) => a.order - b.order);

      const hasAdminRights = userData?.role === 'admin' || userData?.role === 'prof';
      const isViewer = activeNotebook?.ownerUid !== user?.uid && !hasAdminRights && (activeNotebook?.userPermissions || {})[userData?.username] === 'viewer';
      const isCopiedNotebook = !!activeNotebook?.templateSourceId;
      const canShareNotebook = !isViewer && (hasAdminRights || !isCopiedNotebook || activeNotebook?.permissions?.canShare !== false);
      const canGenCodeNotebook = !isViewer && (hasAdminRights || !isCopiedNotebook || activeNotebook?.permissions?.canGenerateCode !== false);
      const canCreateCellsNotebook = !isViewer && (hasAdminRights || !isCopiedNotebook || activeNotebook?.permissions?.canCreate !== false);
      const canUnlockCellsNotebook = !isViewer && (hasAdminRights || !isCopiedNotebook || activeNotebook?.permissions?.canUnlock !== false);

      const selectedCell = activeCells.find(c => c.id === selectedCellId);
      const isSelectedCellFirst = activeCells[0]?.id === selectedCellId;
      const isSelectedCellLast = activeCells[activeCells.length - 1]?.id === selectedCellId;

      const myFilteredNotebooks = myNotebooks.filter(nb => nb.title.toLowerCase().includes(searchQuery.toLowerCase()))
         .sort((a, b) => (b.lastAccessed || new Date(b.createdAt).getTime() || 0) - (a.lastAccessed || new Date(a.createdAt).getTime() || 0));
      const sharedFilteredNotebooks = sharedNotebooks.filter(nb => nb.title.toLowerCase().includes(searchQuery.toLowerCase()))
         .sort((a, b) => (b.lastAccessed || new Date(b.createdAt).getTime() || 0) - (a.lastAccessed || new Date(a.createdAt).getTime() || 0));

      const availableShareUsers = (serverData.users || []).filter(u => 
          u.id !== user?.uid && 
          activeNotebook && !activeNotebook.sharedWith.includes(u.username) &&
          u.username.toLowerCase().includes(shareUsername.toLowerCase())
      );

      const Avatar = ({ name, size=14, role='eleve' }) => (
        <div className={`shrink-0 rounded-full flex items-center justify-center border ${role === 'admin' ? 'bg-red-100 text-red-600 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800' : role === 'prof' ? 'bg-emerald-100 text-emerald-600 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800' : 'bg-primary-100 text-primary-600 border-primary-200 dark:bg-primary-900/30 dark:text-primary-400 dark:border-primary-800'}`} style={{width: size+10, height: size+10}}>
          {role === 'admin' ? <Shield size={size} /> : role === 'prof' ? <GraduationCap size={size} /> : <User size={size} />}
        </div>
      );

      if (isAuthLoading) return <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center text-primary-500"><Loader2 className="w-10 h-10 animate-spin mb-4" /><p>Chargement local...</p></div>;

      if (!userData) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 transition-colors">
            <div className="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 p-8 rounded-2xl w-full max-w-md shadow-2xl transition-colors">
              <div className="flex justify-center mb-6"><div className="w-16 h-16 bg-primary-100 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 rounded-full flex items-center justify-center"><User size={32} /></div></div>
              <h2 className="text-2xl font-bold text-center text-gray-900 dark:text-white mb-2">Collab Notebook</h2>
              <p className="text-gray-500 dark:text-slate-400 text-center mb-8">{authMode === 'login' ? 'Connectez-vous à votre compte' : 'Créez un compte pour commencer à coder'}</p>
              <form onSubmit={handleAuth} className="space-y-4">
                <input type="text" required placeholder="Pseudo (ex: AlanTuring)" value={inputUsername} onChange={(e) => setInputUsername(e.target.value)} className="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary-500 transition-colors" />
                <input type="password" required placeholder="Mot de passe" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} className="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary-500 transition-colors" />
                {authMode === 'register' && (
                  <input type="password" required placeholder="Confirmez le mot de passe" value={inputPasswordConfirm} onChange={(e) => setInputPasswordConfirm(e.target.value)} className="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-4 py-3 text-gray-900 dark:text-white focus:outline-none focus:border-primary-500 transition-colors" />
                )}
                <button type="submit" className="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-3 rounded-lg transition-colors mt-2">
                  {authMode === 'login' ? 'Se connecter' : "S'inscrire"}
                </button>
              </form>
              <div className="mt-6 text-center">
                <button onClick={() => { setAuthMode(authMode === 'login' ? 'register' : 'login'); setInputPasswordConfirm(''); }} className="text-sm text-primary-500 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                  {authMode === 'login' ? "Pas de compte ? S'inscrire" : 'Déjà un compte ? Se connecter'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (currentNbId && !activeNotebook) {
          return (
              <div className="min-h-screen bg-gray-50 dark:bg-[#1e1e1e] flex flex-col items-center justify-center text-primary-500">
                  <Loader2 className="w-10 h-10 animate-spin mb-4" />
                  <p>Ouverture du notebook...</p>
              </div>
          );
      }

      if (!currentNbId) {
        return (
          <div className="min-h-screen p-4 md:p-8 transition-colors relative">
            <div className="max-w-5xl mx-auto">
              
              <header className="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 border-b border-gray-200 dark:border-slate-800 pb-6 gap-4 relative z-50">
                <div className="flex items-center gap-3">
                  <BookOpen size={28} className="text-primary-500" />
                  <h1 className="text-2xl md:text-3xl font-bold text-gray-900 dark:text-white">Mes Notebooks</h1>
                </div>
                
                <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                  <button onClick={() => { setProfileForm({ username: userData.username, email: userData.email || '', description: userData.description || '', oldPassword: '', newPassword: '' }); setIsProfileOpen(true); }} className="flex items-center gap-2 bg-white dark:bg-slate-900 px-4 py-2 rounded-full border border-gray-200 dark:border-slate-800 hover:bg-gray-50 dark:hover:bg-slate-800 transition-colors shadow-sm cursor-pointer" title="Éditer le profil">
                    <Avatar name={userData.username} role={userData.role} size={16} /> 
                    <strong className="text-gray-900 dark:text-white max-w-[100px] truncate">{userData.username}</strong>
                    {userData.role === 'admin' && <span className="text-[10px] bg-red-100 text-red-600 px-1.5 rounded ml-1 font-bold">ADMIN</span>}
                    {userData.role === 'prof' && <span className="text-[10px] bg-emerald-100 text-emerald-600 px-1.5 rounded ml-1 font-bold">PROF</span>}
                  </button>
                  
                  <form onSubmit={handleJoinByCode} className="flex gap-2">
                    <input type="text" placeholder="Code d'accès..." value={joinCode} onChange={(e) => setJoinCode(e.target.value)} className="w-28 md:w-36 bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 transition-colors text-gray-900 dark:text-white" />
                    <button type="submit" className="bg-gray-100 dark:bg-slate-800 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 border border-gray-200 dark:border-slate-700 hover:border-emerald-500 px-3 py-2 rounded-lg text-sm font-medium transition-colors hidden sm:block">Rejoindre</button>
                    <button type="submit" className="bg-gray-100 dark:bg-slate-800 hover:bg-emerald-50 text-emerald-600 border border-gray-200 dark:border-slate-700 px-3 rounded-lg sm:hidden"><Play size={14}/></button>
