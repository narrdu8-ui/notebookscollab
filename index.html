                    disabled={selectedCell.locked && !hasAdminRights}
                    onChange={(e) => handleUpdateCellProperty(selectedCell.id, { type: e.target.value })}
                    className="flex-shrink-0 bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-slate-700 text-xs sm:text-sm text-gray-700 dark:text-slate-200 rounded px-2 py-1 outline-none focus:border-primary-500 disabled:opacity-50 cursor-pointer"
                 >
                    <option value="code">Code Python</option>
                    <option value="markdown">Markdown</option>
                    <option value="raw">Texte brut</option>
                    <option value="heading">Titre</option>
                 </select>

                 {(selectedCell.type === 'markdown' || selectedCell.type === 'heading') && (
                    <div className="flex flex-shrink-0 items-center bg-white dark:bg-[#2d2d2d] rounded border border-gray-300 dark:border-slate-700 ml-2">
                       <button onClick={() => handleUpdateCellProperty(selectedCell.id, { align: 'left' })} className={`p-1 sm:p-1.5 ${selectedCell.align === 'left' || !selectedCell.align ? 'text-primary-500 bg-gray-100 dark:bg-[#3c3c3c]' : 'text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white'} rounded-l transition-colors`} title="Aligner à gauche"><AlignLeft size={14} /></button>
                       <div className="w-px h-4 bg-gray-200 dark:bg-slate-600"></div>
                       <button onClick={() => handleUpdateCellProperty(selectedCell.id, { align: 'center' })} className={`p-1 sm:p-1.5 ${selectedCell.align === 'center' ? 'text-primary-500 bg-gray-100 dark:bg-[#3c3c3c]' : 'text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white'} transition-colors`} title="Centrer"><AlignCenter size={14} /></button>
                       <div className="w-px h-4 bg-gray-200 dark:bg-slate-600"></div>
                       <button onClick={() => handleUpdateCellProperty(selectedCell.id, { align: 'right' })} className={`p-1 sm:p-1.5 ${selectedCell.align === 'right' ? 'text-primary-500 bg-gray-100 dark:bg-[#3c3c3c]' : 'text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white'} rounded-r transition-colors`} title="Aligner à droite"><AlignRight size={14} /></button>
                    </div>
                 )}

                 <div className="flex flex-shrink-0 items-center bg-white dark:bg-[#2d2d2d] rounded border border-gray-300 dark:border-slate-700 ml-2">
                   <button onClick={() => handleMoveCell(selectedCell.id, 'up')} disabled={(isSelectedCellFirst || selectedCell.locked) && !hasAdminRights} className="p-1 sm:p-1.5 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-30 rounded-l hover:bg-gray-100 dark:hover:bg-[#3c3c3c] transition-colors" title="Monter"><ArrowUp size={14} /></button>
                   <div className="w-px h-4 bg-gray-200 dark:bg-slate-600"></div>
                   <button onClick={() => handleMoveCell(selectedCell.id, 'down')} disabled={(isSelectedCellLast || selectedCell.locked) && !hasAdminRights} className="p-1 sm:p-1.5 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-30 rounded-r hover:bg-gray-100 dark:hover:bg-[#3c3c3c] transition-colors" title="Descendre"><ArrowDown size={14} /></button>
                 </div>

                 <div className="flex flex-shrink-0 items-center bg-white dark:bg-[#2d2d2d] rounded border border-gray-300 dark:border-slate-700 ml-2">
                   <button onClick={handleCopyCell} className="p-1 sm:p-1.5 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white rounded-l hover:bg-gray-100 dark:hover:bg-[#3c3c3c] transition-colors" title="Copier la cellule"><CopyIcon size={14} /></button>
                   <div className="w-px h-4 bg-gray-200 dark:bg-slate-600"></div>
                   <button onClick={handleCutCell} disabled={selectedCell.locked && !canUnlockCellsNotebook && !hasAdminRights} className="p-1 sm:p-1.5 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-30 hover:bg-gray-100 dark:hover:bg-[#3c3c3c] transition-colors" title="Couper la cellule"><Scissors size={14} /></button>
                   <div className="w-px h-4 bg-gray-200 dark:bg-slate-600"></div>
                   <button onClick={handlePasteCell} disabled={!clipboardCell || (!canCreateCellsNotebook && !hasAdminRights)} className="p-1 sm:p-1.5 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-30 rounded-r hover:bg-gray-100 dark:hover:bg-[#3c3c3c] transition-colors" title="Coller la cellule"><ClipboardPaste size={14} /></button>
                 </div>

                 <div className="flex flex-shrink-0 items-center gap-2 ml-auto">
                   {(canUnlockCellsNotebook || hasAdminRights) && (activeNotebook?.ownerUid === user?.uid || hasAdminRights) && (
                     <button onClick={() => handleUpdateCellProperty(selectedCell.id, { locked: !selectedCell.locked })} className={`flex items-center gap-1.5 px-2 py-1.5 rounded transition-colors text-xs font-medium ${selectedCell.locked ? 'text-amber-600 bg-amber-100 dark:text-amber-400 dark:bg-amber-900/30' : 'text-gray-600 bg-white border border-gray-300 dark:bg-[#2d2d2d] dark:border-slate-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-[#3c3c3c]'}`} title={selectedCell.locked ? "Déverrouiller" : "Verrouiller"}>
                       {selectedCell.locked ? <Lock size={14} /> : <Unlock size={14} />} <span className="hidden sm:inline">{selectedCell.locked ? 'Verrouillé' : 'Libre'}</span>
                     </button>
                   )}
                   {selectedCell.type === 'code' && (
                      <button onClick={() => handleUpdateCellProperty(selectedCell.id, { output: '', status: 'idle', executionCount: null })} disabled={!selectedCell.output && selectedCell.status !== 'error'} className="flex items-center gap-1.5 px-2 py-1.5 text-gray-600 dark:text-slate-300 bg-white border border-gray-300 dark:bg-[#2d2d2d] dark:border-slate-700 hover:bg-gray-100 dark:hover:bg-[#3c3c3c] disabled:opacity-30 rounded transition-colors text-xs font-medium" title="Effacer la console">
                         <XCircle size={14} /> <span className="hidden sm:inline">Effacer console</span>
                      </button>
                   )}
                   
                   {(canCreateCellsNotebook || hasAdminRights) && (
                     <button onClick={() => handleDeleteCell(selectedCell.id)} disabled={selectedCell.locked && activeNotebook?.ownerUid !== user?.uid && !hasAdminRights} className="flex items-center gap-1.5 px-2 py-1.5 text-red-600 bg-red-50 border border-red-200 dark:text-red-400 dark:bg-red-950/30 dark:border-red-900/50 hover:bg-red-100 dark:hover:bg-red-900/50 disabled:opacity-30 rounded transition-colors text-xs font-medium" title="Supprimer la cellule">
                        <Trash2 size={14} /> <span className="hidden sm:inline">Supprimer</span>
                     </button>
                   )}
                 </div>
               </div>
            ) : (
               <div className="bg-gray-100 dark:bg-[#1e1e1e] border-b border-gray-200 dark:border-slate-800 px-4 py-2 min-h-[44px] flex items-center justify-center">
                 <span className="text-xs text-gray-500 dark:text-slate-500 italic">Sélectionnez une cellule pour modifier son type ou la supprimer</span>
               </div>
            )}
          </div>
          
          <main className="max-w-5xl mx-auto py-4 sm:py-8 px-2 sm:px-4 flex-1 w-full">
            {activeCells.length === 0 ? (
              <div className="text-center py-20 bg-white dark:bg-[#161b22] rounded-xl border border-dashed border-gray-300 dark:border-slate-700 shadow-sm mx-2">
                <Code2 size={48} className="mx-auto text-gray-400 dark:text-slate-600 mb-4" />
                <h2 className="text-xl font-medium text-gray-700 dark:text-slate-300 mb-4">Notebook vide</h2>
                {(canCreateCellsNotebook || hasAdminRights) && (
                  <button onClick={() => handleAddCell(false)} className="inline-flex items-center gap-2 px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors shadow-sm"><Plus size={18} /> Créer la première cellule</button>
                )}
              </div>
            ) : (
              <div className="space-y-2">
                {activeCells.map((cell) => {
                  const remoteCursors = Object.entries(remoteCursorsState)
                      .filter(([uid, cursor]) => uid !== user?.uid && cursor.cellId === cell.id)
                      .map(([uid, cursor]) => ({ userId: uid, ...cursor }));

                  return (
                  <Cell 
                    key={cell.id} 
                    cell={cell} 
                    isSelected={selectedCellId === cell.id}
                    onSelect={setSelectedCellId}
                    onUpdateProperty={handleUpdateCellProperty} 
                    onUpdateCode={handleUpdateCellCode}
                    onUpdateCursor={handleUpdateCursor}
                    remoteCursors={remoteCursors}
                    pyodide={pyodide} 
                    isPyodideLoading={isPyodideLoading} 
                    isMonacoReady={isMonacoReady} 
                    registerRun={registerCellRun}
                    handleSnapshot={handleSnapshot}
                    isDark={isDark}
                    hasAdminRights={hasAdminRights}
                    getNextExecutionCount={getNextExecutionCount}
                    isViewer={isViewer}
                  />
                )})}
                {(canCreateCellsNotebook || hasAdminRights) && (
                  <div className="flex justify-center pt-6 pb-12">
                    <button onClick={() => handleAddCell(false)} className="flex items-center gap-2 px-6 py-2 bg-white dark:bg-[#252526] hover:bg-gray-50 dark:hover:bg-[#2d2d2d] border border-gray-200 dark:border-[#3c3c3c] text-gray-700 dark:text-[#cccccc] font-medium rounded transition-colors shadow-sm"><Plus size={16} /> Nouvelle cellule</button>
                  </div>
                )}
              </div>
            )}
          </main>

          {isCodeModalOpen && activeNotebook && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[99999] p-4">
              <div className="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl relative">
                <button onClick={() => setIsCodeModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-900 dark:hover:text-white"><X size={20}/></button>
                <h2 className="text-xl font-bold text-gray-900 dark:text-white mb-4">Générer un Code Élève</h2>

                <div className="mb-6 p-4 bg-gray-50 dark:bg-slate-800 rounded-lg text-center border border-gray-200 dark:border-slate-700">
                  {activeNotebook.accessCode ? (
                      <div>
                        <div className="text-sm text-gray-500 dark:text-slate-400 mb-1">Code actuel</div>
                        <div className="text-2xl font-mono font-bold text-emerald-600 dark:text-emerald-400 tracking-widest">{activeNotebook.accessCode}</div>
                      </div>
                  ) : (
                      <div className="text-sm text-gray-500 dark:text-slate-400">Aucun code généré</div>
                  )}
                  <div className="flex justify-center gap-2 mt-4">
                    <button onClick={handleGenerateAccessCode} className="text-sm bg-gray-200 dark:bg-slate-700 hover:bg-gray-300 dark:hover:bg-slate-600 text-gray-800 dark:text-slate-200 px-4 py-2 rounded transition-colors font-medium">
                      {activeNotebook.accessCode ? 'Régénérer le code' : 'Générer un code'}
                    </button>
                    {activeNotebook.accessCode && (
                      <button onClick={handleDisableAccessCode} className="text-sm bg-red-100 dark:bg-red-900/30 hover:bg-red-200 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 px-4 py-2 rounded transition-colors font-medium">
                        Désactiver
                      </button>
                    )}
                  </div>
                </div>

                <h3 className="text-sm font-semibold text-gray-900 dark:text-slate-200 mb-3">Permissions pour les élèves (copies)</h3>
                <div className="space-y-3 mb-6 bg-gray-50 dark:bg-slate-800/50 p-4 rounded-lg border border-gray-200 dark:border-slate-700/50">
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={codePermissions.canUnlock} onChange={e => setCodePermissions({...codePermissions, canUnlock: e.target.checked})} className="w-4 h-4 rounded text-primary-600" />
                    <span className="text-sm text-gray-700 dark:text-slate-300">Déverrouiller les cellules verrouillées</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={codePermissions.canCreate} onChange={e => setCodePermissions({...codePermissions, canCreate: e.target.checked})} className="w-4 h-4 rounded text-primary-600" />
                    <span className="text-sm text-gray-700 dark:text-slate-300">Créer et supprimer des cellules</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={codePermissions.canShare} onChange={e => setCodePermissions({...codePermissions, canShare: e.target.checked})} className="w-4 h-4 rounded text-primary-600" />
                    <span className="text-sm text-gray-700 dark:text-slate-300">Partager le notebook</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={codePermissions.canGenerateCode} onChange={e => setCodePermissions({...codePermissions, canGenerateCode: e.target.checked})} className="w-4 h-4 rounded text-primary-600" />
                    <span className="text-sm text-gray-700 dark:text-slate-300">Générer un code (Copie de copie)</span>
                  </label>
                </div>

                <button onClick={handleSavePermissions} className="w-full bg-primary-600 hover:bg-primary-700 text-white py-2.5 rounded-lg font-medium transition-colors shadow-sm">Enregistrer les paramètres</button>
              </div>
            </div>
          )}

          {isSharing && activeNotebook && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[99999] p-4">
              <div className="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl relative">
                <button onClick={() => setIsSharing(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-900 dark:hover:text-white"><X size={20}/></button>
                <h2 className="text-xl font-bold text-gray-900 dark:text-white mb-2">Gérer les accès</h2>
                <p className="text-sm text-gray-500 dark:text-slate-400 mb-6">Invitez des collaborateurs sur le notebook <strong className="text-gray-900 dark:text-white">{activeNotebook.title}</strong>.</p>
                
                <form onSubmit={handleAddShare} className="flex gap-2 mb-6 relative">
                  <div className="relative flex-1">
                    <input 
                      type="text" 
                      placeholder="Entrer le pseudo exact..." 
                      value={shareUsername} 
                      onChange={(e) => { setShareUsername(e.target.value); setShowShareSuggestions(true); }}
                      onFocus={() => setShowShareSuggestions(true)}
                      onBlur={() => setTimeout(() => setShowShareSuggestions(false), 200)}
                      className="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-2.5 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-primary-500" 
                    />
                    {showShareSuggestions && shareUsername && availableShareUsers.length > 0 && (
                        <ul className="absolute z-10 w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 mt-1 rounded-lg shadow-lg max-h-40 overflow-y-auto custom-scrollbar">
                            {availableShareUsers.map(u => (
                                <li 
                                    key={u.id} 
                                    onClick={() => { setShareUsername(u.username); setShowShareSuggestions(false); }}
                                    className="px-3 py-2 text-sm cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700 text-gray-900 dark:text-slate-200"
                                >
                                    {u.username}
                                </li>
                            ))}
                        </ul>
                    )}
                  </div>
                  <button type="submit" className="bg-primary-600 hover:bg-primary-700 px-4 rounded-lg text-white text-sm font-medium transition-colors h-[42px]">Ajouter</button>
                </form>
                
                {(activeNotebook.sharedWith || []).length > 0 ? (
                  <div>
                    <span className="text-xs text-gray-400 dark:text-slate-400 font-semibold mb-3 block uppercase tracking-wider">Partagé avec :</span>
                    <div className="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                      {(activeNotebook.sharedWith || []).map(u => {
                         const sharedUserObj = serverData.users.find(user => user.username === u);
                         return (
                        <div key={u} className="flex justify-between items-center bg-gray-50 dark:bg-slate-800 px-3 py-2.5 rounded-lg border border-gray-200 dark:border-slate-700">
                          <div className="flex items-center gap-2 cursor-pointer hover:underline" onClick={() => { if(sharedUserObj) setViewingUser(sharedUserObj); }}>
                            <User size={16} className="text-primary-500" />
                            <span className="text-sm text-gray-700 dark:text-slate-200 font-medium">{u}</span>
                          </div>
                          <div className="flex items-center gap-2">
                             {(activeNotebook.ownerUid === user?.uid || hasAdminRights) ? (
                                 <select value={(activeNotebook.userPermissions || {})[u] || 'editor'} onChange={(e) => handleChangeShareRole(u, e.target.value)} className="text-xs bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-slate-600 rounded px-1 py-1 outline-none focus:border-primary-500 text-gray-700 dark:text-slate-200">
                                    <option value="editor">Éditeur</option>
                                    <option value="viewer">Lecteur</option>
                                 </select>
                             ) : (
                                 <span className="text-xs text-gray-500 dark:text-slate-400">{(activeNotebook.userPermissions || {})[u] === 'viewer' ? 'Lecteur' : 'Éditeur'}</span>
                             )}
                             {(activeNotebook.ownerUid === user?.uid || hasAdminRights) && (
                                <button onClick={() => handleRemoveShare(u)} className="text-gray-400 hover:text-red-500 transition-colors p-1 hover:bg-gray-200 dark:hover:bg-slate-700 rounded"><X size={16}/></button>
                             )}
                          </div>
                        </div>
                      )})}
                    </div>
                  </div>
                ) : (
                  <div className="text-center p-4 bg-gray-50 dark:bg-slate-800/50 rounded-lg border border-gray-200 dark:border-slate-700 border-dashed">
                    <p className="text-sm text-gray-500">Ce notebook n'est partagé avec personne pour le moment.</p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
